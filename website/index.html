<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verba — a language tutor that runs on your machine</title>
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#F5F1E8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171410" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      .lang-root { max-width: 600px; margin: 120px auto; padding: 0 32px; text-align: center; animation: vfade .5s ease both; }
      .lang-root h1 { font-size: clamp(28px, 3.4vw, 40px); margin: 0 0 10px; }
      .lang-root p { font-size: 15px; color: var(--ink2); line-height: 1.7; margin: 0 0 32px; }
      .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
      .lang-grid a { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border: 1px solid var(--line); border-radius: 9px; font-size: 14px; color: var(--ink); text-decoration: none; }
      .lang-grid a:hover { background: var(--surface); text-decoration: none; border-color: var(--accent-ink); }
      .lang-grid a .lc { font-size: 10px; color: var(--ink3); letter-spacing: .08em; text-transform: uppercase; }
      .redirect-msg { margin-top: 24px; font-size: 13px; color: var(--ink3); }
    </style>
  </head>
  <body>
    <main class="lang-root">
      <h1>Verba<b style="color:#B4552D;font-weight:600">.</b></h1>
      <p>A language tutor that runs on your machine. Choose your language.</p>
      <div class="lang-grid">
        <a href="/en/"><span>English</span><span class="lc">en</span></a>
        <a href="/tr/"><span>Türkçe</span><span class="lc">tr</span></a>
        <a href="/es/"><span>Español</span><span class="lc">es</span></a>
        <a href="/fr/"><span>Français</span><span class="lc">fr</span></a>
        <a href="/de/"><span>Deutsch</span><span class="lc">de</span></a>
        <a href="/ja/"><span>日本語</span><span class="lc">ja</span></a>
        <a href="/it/"><span>Italiano</span><span class="lc">it</span></a>
        <a href="/pt/"><span>Português</span><span class="lc">pt</span></a>
      </div>
      <p class="redirect-msg">Redirecting based on your browser language…</p>
    </main>
    <script>
      (function () {
        var map = { en:"en",tr:"tr",es:"es",fr:"fr",de:"de",ja:"ja",it:"it",pt:"pt","pt-BR":"pt","pt-PT":"pt" };
        var nav = (navigator.language||"").split("-")[0];
        var t = map[nav]||"en";
        if (window.location.pathname === "/") window.location.replace("/"+t+"/");
      })();
    </script>
  </body>
</html>
